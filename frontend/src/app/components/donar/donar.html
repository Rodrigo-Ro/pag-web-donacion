<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow">
          <div class="card-body p-5">

            <h2 class="text-center fw-bold mb-4">Realizar Donación</h2>

            <!-- MENSAJE DE ÉXITO -->
            <div *ngIf="successMessage" class="alert alert-success text-center">
              {{ successMessage }}
            </div>

            <form [formGroup]="donationForm" (ngSubmit)="onSubmit()">

              <!-- NOMBRE -->
              <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input class="form-control"
                       formControlName="nombre"
                       placeholder="Ej: Juan Pérez">

                <small class="text-danger"
                  *ngIf="donationForm.get('nombre')?.touched && donationForm.get('nombre')?.invalid">
                  Nombre inválido (mínimo 3 caracteres)
                </small>
              </div>

              <!-- EMAIL -->
              <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input class="form-control"
                       formControlName="email"
                       placeholder="Ej: correo@gmail.com">

                <small class="text-danger"
                  *ngIf="donationForm.get('email')?.touched && donationForm.get('email')?.invalid">
                  Ingresa un correo válido
                </small>
              </div>

              <!-- TELÉFONO -->
              <div class="mb-3">
                <label class="form-label">Número de celular</label>
                <input class="form-control"
                       formControlName="telefono"
                       maxlength="9"
                       (input)="allowOnlyNumbers($event)"
                       placeholder="Ej: 912345678">

                <small class="text-danger"
                  *ngIf="donationForm.get('telefono')?.touched && donationForm.get('telefono')?.invalid">
                  Debe tener 9 dígitos y empezar con número válido
                </small>
              </div>

              <!-- TIPO DE DONACIÓN -->
              <div class="mb-3">
                <label class="form-label">Tipo de Donación</label>

                <div class="form-check" *ngFor="let tipo of tiposDonacion">
                  <input class="form-check-input"
                         type="checkbox"
                         [value]="tipo"
                         (change)="onCheckboxChange($event)">

                  <label class="form-check-label">
                    {{ tipo }}
                  </label>
                </div>

                <small class="text-danger"
                  *ngIf="submitted && tipoArray.length === 0">
                  Selecciona al menos un tipo de donación
                </small>
              </div>

              <!-- PUNTO DE ENTREGA -->
              <div class="mb-3">
                <label class="form-label">Punto de entrega en Huancayo</label>

                <select class="form-select" formControlName="puntoEntrega">
                  <option value="">Selecciona un punto</option>
                  <option>Centro de Huancayo</option>
                  <option>El Tambo</option>
                  <option>Chilca</option>
                  <option>San Carlos</option>
                  <option>Coordinación por WhatsApp</option>
                </select>
              </div>

              <!-- DESCRIPCIÓN -->
              <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea class="form-control"
                          rows="4"
                          formControlName="descripcion"
                          placeholder="Describe tu donación..."></textarea>

                <small class="text-danger"
                  *ngIf="donationForm.get('descripcion')?.touched && donationForm.get('descripcion')?.invalid">
                  Mínimo 10 caracteres
                </small>
              </div>

              <!-- BOTÓN -->
              <button class="btn btn-primary w-100" type="submit">
                Donar Ahora
              </button>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>
